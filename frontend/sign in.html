<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUREA</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Poppins,sans-serif;
    background:#f8f5f0;
}

/* HERO */

.hero{
    width:100%;
    height:100vh;
    background:url("hero-background.png") center center/cover no-repeat;
    display:flex;
    align-items:center;
    padding:0 8%;
}

.content{
    max-width:520px;
}

.small-title{
    text-transform:uppercase;
    letter-spacing:5px;
    font-size:14px;
    color:#8f6b4a;
    margin-bottom:25px;
}

h1{
    font-family:"Cormorant Garamond",serif;
    font-size:86px;
    line-height:0.95;
    color:#4d3522;
    font-weight:500;
}

h1 span{
    font-style:italic;
    color:#8b6545;
}

p{
    margin-top:35px;
    color:#5c5147;
    line-height:1.9;
    font-size:17px;
}

.buttons{
    margin-top:45px;
    display:flex;
    gap:20px;
}

.btn{
    text-decoration:none;
    padding:18px 38px;
    font-size:14px;
    letter-spacing:2px;
    text-transform:uppercase;
    transition:.35s;
}

.primary{
    background:#8b6545;
    color:white;
}

.primary:hover{
    background:#6f4e34;
}

.secondary{
    border:1px solid #8b6545;
    color:#8b6545;
    background:white;
}

.secondary:hover{
    background:#8b6545;
    color:white;
}

@media(max-width:900px){

.hero{
    justify-content:center;
    text-align:center;
    padding:40px;
}

.buttons{
    justify-content:center;
    flex-wrap:wrap;
}

h1{
    font-size:60px;
}

}

</style>

</head>
<body>

<section class="hero">

<div class="content">

<div class="small-title">
Occasion Wear, Reimagined
</div>

<h1>
The collection,<br>
<span>curated.</span>
</h1>

<p>
Discover timeless pieces from the world's most renowned designers.
Curated for the modern woman with appreciation for luxury,
craftsmanship, and effortless elegance.
</p>

<div class="buttons">

<a href="#" class="btn primary">
Shop Collection
</a>

<a href="#" class="btn secondary">
Explore Designers
</a>

</div>

</div>

</section>

</body>
</html>
